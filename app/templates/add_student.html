<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ action }} Student</title>
{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">🎓 Student Analytics</span>
    <div class="nav-links">
      <a href="{% url 'dashboard' %}">Dashboard</a>
      <a href="{% url 'logout' %}">Logout</a>
    </div>
  </nav>

  <div class="container" style="max-width:520px;margin-top:2rem;">
    <div class="card">
      <h2>{{ action }} Student</h2>
      {% if error %}<div class="alert">{{ error }}</div>{% endif %}
      <form method="POST">
        {% csrf_token %}
        <div class="field">
          <label>Full Name</label>
          <input type="text" name="name" value="{{ student.name|default:'' }}" required>
        </div>
        <div class="field">
          <label>Roll No</label>
          <input type="text" name="roll_no" value="{{ student.roll_no|default:'' }}" required>
        </div>
        <div class="field">
          <label>Marks (0–100)</label>
          <input type="number" name="marks" min="0" max="100" step="0.1"
                 value="{{ student.marks|default:'' }}" required>
        </div>
        <div class="field">
          <label>Attendance % (0–100)</label>
          <input type="number" name="attendance" min="0" max="100" step="0.1"
                 value="{{ student.attendance|default:'' }}" required>
        </div>
        <div style="display:flex;gap:1rem;margin-top:1.5rem;">
          <button type="submit" class="btn-primary">💾 Save</button>
          <a href="{% url 'dashboard' %}" class="btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
